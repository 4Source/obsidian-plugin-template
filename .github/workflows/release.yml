name: Release new plugin version
on: 
  workflow_dispatch:
    inputs: 
      selected_release_type:
        description: "Choose version update type"
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      force_release:
        description: "Forces a release even without changes (not auto)"
        type: boolean
        default: false
  
  schedule:
    # Schedule automatic release every Wednesday
    # - cron: '0 0 * * 3'
    - cron: '45 * * * *'


jobs:
  release:
    runs-on: ubuntu-latest
    permissions: 
        pull-requests: write
        contents: write

    steps: 
      - name: Checkout
        id: checkout
        # TODO: Have to use this commit because fetch-tags is not working in main till this is merged to main
        uses: actions/checkout@0548471950d86b19eae6c063105707c831fb5c03
        with:
          ref: ${{ github.event.ref }}
          fetch-tags: true

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      
      - name: Check changes since last release
        id: changes
        run: |
          echo "skip=false" >> $GITHUB_OUTPUT

          echo "::debug::Tags: git tag --list"

          # Find the latest semver tag
          LAST_VERSION_TAG=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v '-' | sort -V | tail -n1 || echo "")

          if [ -z "$LAST_VERSION_TAG" ]; then
            echo "No previous tag found. Assuming first release."
          else
            echo "Last tag: $LAST_VERSION_TAG"
            if git diff --quiet "$LAST_VERSION_TAG"..HEAD -- src/; then
              if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                echo "::warning::No changes in /src since last release."
                FORCE_RELEASE="${{ github.event.inputs.force_release || false }}"
                if $FORCE_RELEASE && [ "${{ inputs.selected_release_type }}" != "auto" ]; then
                  echo "::warning::Forced release."
                elif $FORCE_RELEASE && [ "${{ inputs.selected_release_type }}" == "auto" ]; then
                  echo "::error::Forces is not possible with release type auto."
                  exit 1
                else 
                  exit 1
                fi
              elif [ "${{ github.event_name }}" == "schedule" ]; then
                echo "No changes in /src since last release."
                echo "skip=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            else
              echo "::debug::Changes detected in /src since last release."
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Requested release type: ${{ inputs.selected_release_type }}"

            if [ "${{ inputs.selected_release_type }}" != "auto" ]; then
              echo "release_type=${{ inputs.selected_release_type }}" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Find the highest release type
          if git tag --list | grep -q 'major'; then
            RELEASE_TYPE_TAG="major"
          elif git tag --list | grep -q 'minor'; then
            RELEASE_TYPE_TAG="minor"
          elif git tag --list | grep -q 'patch'; then
            RELEASE_TYPE_TAG="patch"
          else
            echo "::error::No tag found matching a release type."
            exit 1
          fi

          echo "Release tag: $RELEASE_TYPE_TAG"
          echo "release_type=$RELEASE_TYPE_TAG" >> $GITHUB_OUTPUT
                   
      
      - name: Install Dependencies
        if: ${{ steps.changes.outputs.skip == 'false' }}
        run: npm install

      - name: Bump version
        if: ${{ steps.changes.outputs.skip == 'false' }}
        id: version-bump
        uses: 4Source/version-control-action@v1
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repository:  ${{ github.event.repository.name }}
          version_increase: ${{ steps.changes.outputs.release_type }}
          tag_prefix: ''
          dry_run: true

      - name: Configure git
        if: ${{ steps.changes.outputs.skip == 'false' }}
        run: |
          git config --global user.name "4Source"
          git config --global user.email "38220764+4Source@users.noreply.github.com"

      - name: Change version in files
        if: ${{ steps.changes.outputs.skip == 'false' }}
        run: | 
          npm run version -- --new_version=${{ steps.version-bump.outputs.new_version }}
          git add manifest.json versions.json package.json
      
      - name: Commit and push changes
        if: ${{ steps.changes.outputs.skip == 'false' }}
        run: |
          git commit -a -m "Apply version ${{ steps.version-bump.outputs.new_version }}"
          git push
        
      - name: Push version tag
        if: ${{ steps.changes.outputs.skip == 'false' }}
        run: |
          git tag -a ${{ steps.version-bump.outputs.new_version }} -m "${{ steps.version-bump.outputs.new_version }}"
          git push origin ${{ steps.version-bump.outputs.new_version }}

      - name: Build plugin
        if: ${{ steps.changes.outputs.skip == 'false' }}
        id: build-plugin
        run: |
          npm run build

          if [ ! -f main.js ]; then
            echo "Error: main.js is missing."
            exit 1
          fi

          if [ ! -f manifest.json ]; then
            echo "Error: manifest.json is missing."
            exit 1
          fi

          FILES="main.js manifest.json"
          if [ -f styles.css ]; then
            FILES="$FILES styles.css"
          fi
          echo "release_files=$FILES" >> $GITHUB_OUTPUT
  
      - name: Create release
        if: ${{ steps.changes.outputs.skip == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES="${{ steps.build-plugin.outputs.release_files }}"
          gh release create "${{ steps.version-bump.outputs.new_version }}" \
            --title "${{ steps.version-bump.outputs.new_version }}" \
            --generate-notes \
            $FILES
      
      - name: Remove release type tags
        run: |
          FAILED=0

          for tag in major minor patch; do
            if [ -n "$(git tag -l "$tag")" ]; then
              echo "Deleting remote tag: $tag"
              if git push --delete origin $tag; then
                echo "::debug::Deleted remote tag $tag"
              else
                echo "::error::Failed to delete remote tag $tag"
                FAILED=1
              fi
            else
              echo "::debug::No $tag tag found locally."
            fi
          done

          exit $FAILED
